<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake 1v1 — Stage Select</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/game.css" />
</head>

<body>
  <div class="crt-overlay"></div>

  <div class="top-nav-bar px-4 py-2">
    <a href="/" class="btn-back text-decoration-none">← VOLVER AL MENÚ</a>
  </div>

  <div class="arcade-container fade-in main-with-nav container-fluid">
    <div class="level-select-container container h-100 d-flex flex-column justify-content-evenly">
      
      <div class="level-header text-center w-100">
        <h1 class="arcade-title">SELECCIÓN DE NIVEL</h1>
        <p class="arcade-subtitle mb-0">ELIGE TU ARENA</p>
      </div>

      <div id="level-error" class="alert-arcade hidden mx-auto" style="max-width: 600px;"></div>

      <div class="row w-100 justify-content-center g-3" id="levels-container">
        <!-- Niveles generados por JS (Bootstrap Cols) -->
      </div>

      <div class="text-center w-100">
        <button id="btn-go-game" class="btn-arcade giant-btn hidden mt-0 mb-0">¡A JUGAR!</button>
      </div>
      
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/scripts/levels-page.js"></script>
</body>

</html>
