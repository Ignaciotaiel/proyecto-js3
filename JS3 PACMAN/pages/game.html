<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PacMan JS3 — Juego</title>
  <meta name="description" content="Canvas del juego PacMan. Usá las flechas o WASD para moverte." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/game.css" />
</head>
<body>
  <!-- Wrapper principal del juego -->
  <div class="container-fluid p-0">
    <div class="row g-0 game-wrapper" id="game-wrapper">
      <!-- Canvas de juego -->
      <section class="col-12 col-md-8 col-lg-9 canvas-section d-flex align-items-center justify-content-center" id="canvas-section" aria-label="Canvas del juego">
        <canvas id="game-canvas" aria-label="Área de juego PacMan"></canvas>
      </section>

      <!-- Panel lateral -->
      <aside class="col-12 col-md-4 col-lg-3 side-panel" id="side-panel" aria-label="Panel de estado del juego">
      <!-- Modo de juego badge -->
      <div class="text-center mb-2">
        <span id="mode-badge"
          style="font-family:'Press Start 2P',monospace; font-size:0.5rem; color:var(--pac-neon-pink); text-shadow:0 0 5px var(--pac-neon-pink);">
          CARGANDO...
        </span>
      </div>

      <!-- High Score Personal -->
      <div class="text-center mb-3">
        <div class="score-label" style="color:var(--pac-neon-pink); text-shadow:0 0 5px var(--pac-neon-pink);">HIGH SCORE</div>
        <div class="score-value" id="high-score-val" style="color:var(--pac-neon-pink); text-shadow:0 0 10px var(--pac-neon-pink);">0</div>
      </div>

      <!-- Jugador 1 -->
      <div id="player1-section">
        <div class="player-name-display" id="p1-name">---</div>
        <div class="score-label">SCORE</div>
        <div class="score-value" id="p1-score">0</div>
        <div class="d-flex align-items-center gap-2 mt-2">
          <div class="score-label">VIDAS</div>
          <div class="lives-display" id="p1-lives">
            <span class="life-icon">😮</span>
            <span class="life-icon">😮</span>
            <span class="life-icon">😮</span>
          </div>
        </div>
      </div>

      <!-- Jugador 2 (oculto en modo solo) -->
      <div id="player2-section" class="d-none">
        <hr class="my-2" />
        <div class="player-name-display" id="p2-name"
          style="color: #FF69B4;">---</div>
        <div class="score-label">SCORE P2</div>
        <div class="score-value" id="p2-score"
          style="color: #FF69B4;">0</div>
        <div class="d-flex align-items-center gap-2 mt-2">
          <div class="score-label">VIDAS</div>
          <div class="lives-display" id="p2-lives">
            <span class="life-icon">😮</span>
            <span class="life-icon">😮</span>
            <span class="life-icon">😮</span>
          </div>
        </div>
      </div>

      <hr class="my-1" />

      <!-- Nivel -->
      <div class="d-flex align-items-center gap-2">
        <div class="score-label">NIVEL</div>
        <div class="level-badge" id="level-display">1</div>
      </div>

      <!-- Timer de turno (oculto fuera de modo turnos) -->
      <div id="turn-section" class="d-none">
        <hr class="my-1" />
        <div class="score-label">TURNO DE</div>
        <div class="turn-player-badge" id="turn-player-name">---</div>
        <div class="score-label mt-1">TIEMPO</div>
        <div class="turn-timer" id="turn-timer">30</div>
      </div>

      <hr class="my-1" />

      <!-- Controles -->
      <div class="controls-info" id="controls-info">
        <div><span class="key-badge">WASD</span> Mover P1</div>
        <div id="p2-controls-hint" class="d-none">
          <span class="key-badge">↑↓←→</span> Mover P2
        </div>
        <div class="mt-1"><span class="key-badge">ESC</span> Pausa</div>
      </div>

      <!-- Joystick Virtual para Celulares -->
      <div id="mobile-joystick-container" class="d-none w-100 justify-content-center mt-3 mb-2">
        <div class="joystick-base" id="joystick-base">
          <div class="joystick-ring"></div>
          <div class="joystick-handle" id="joystick-handle"></div>
        </div>
      </div>

      <!-- Botones de control -->
      <div class="d-flex gap-2 mt-auto flex-wrap" id="action-buttons">
        <button class="btn btn-sm btn-arcade flex-fill" id="pause-btn"
          style="font-family:'Press Start 2P',monospace; font-size:0.4rem;">
          ⏸ PAUSE
        </button>
        <a href="/index.html" class="btn btn-sm btn-arcade flex-fill"
          style="font-family:'Press Start 2P',monospace; font-size:0.4rem;">
          ✖ EXIT
        </a>
      </div>
    </aside>
    </div>
  </div>

  <!-- Modal: Game Over -->
  <div class="modal fade" id="gameover-modal" tabindex="-1"
    aria-labelledby="gameoverLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 justify-content-center">
          <h2 class="modal-game-title" id="gameoverLabel">GAME OVER</h2>
        </div>
        <div class="modal-body text-center">
          <div id="gameover-winner"
            style="font-family:'Press Start 2P',monospace; font-size:0.6rem; margin-bottom:1rem;">
          </div>
          <table class="table modal-result-table" id="gameover-scores">
            <thead>
              <tr>
                <th>JUGADOR</th>
                <th>SCORE</th>
              </tr>
            </thead>
            <tbody id="gameover-scores-body"></tbody>
          </table>
        </div>
        <div class="modal-footer border-0 justify-content-center flex-wrap gap-2">
          <button class="btn btn-warning" id="restart-btn"
            style="font-family:'Press Start 2P',monospace; font-size:0.5rem;">
            🔄 NUEVA PARTIDA
          </button>
          <a href="/index.html" class="btn btn-secondary"
            style="font-family:'Press Start 2P',monospace; font-size:0.5rem;">
            🏠 INICIO
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Pausa -->
  <div class="modal fade" id="pause-modal" tabindex="-1"
    aria-labelledby="pauseLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header border-0 justify-content-center">
          <h5 class="modal-game-title" id="pauseLabel">⏸ PAUSA</h5>
        </div>
        <div class="modal-footer border-0 justify-content-center flex-wrap gap-2">
          <button class="btn btn-warning" id="resume-btn"
            style="font-family:'Press Start 2P',monospace; font-size:0.5rem;">
            ▶ CONTINUAR
          </button>
          <a href="/index.html" class="btn btn-secondary"
            style="font-family:'Press Start 2P',monospace; font-size:0.5rem;">
            🏠 SALIR
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Level Up -->
  <div class="modal fade" id="levelup-modal" tabindex="-1"
    aria-labelledby="levelupLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content bg-transparent border-0 text-center">
        <div class="modal-body">
          <div class="level-up-text" id="levelup-text">¡NIVEL X COMPLETADO!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: cambio de turno -->
  <div class="modal fade" id="turn-switch-modal" tabindex="-1"
    aria-labelledby="turnSwitchLabel" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header border-0 justify-content-center">
          <h5 class="modal-game-title" id="turnSwitchLabel">🔄 CAMBIO DE TURNO</h5>
        </div>
        <div class="modal-body text-center">
          <div id="turn-switch-name"
            style="font-family:'Press Start 2P',monospace; font-size:0.7rem;
            color:var(--pac-yellow);">
          </div>
        </div>
        <div class="modal-footer border-0 justify-content-center">
          <button class="btn btn-warning" id="turn-switch-ok"
            style="font-family:'Press Start 2P',monospace; font-size:0.5rem;">
            ¡LISTO!
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/scripts/game.js"></script>
</body>
</html>
