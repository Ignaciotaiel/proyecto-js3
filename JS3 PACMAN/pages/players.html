<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PacMan Mundial — Jugadores</title>
  <meta name="description" content="Registrá tu jugador y elegí tu avatar para jugar PacMan." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/players.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" id="main-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="/index.html">👾 PACMAN MUNDIAL</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
        data-bs-target="#navbarMenu2" aria-controls="navbarMenu2"
        aria-expanded="false" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu2">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/index.html">INICIO</a></li>
          <li class="nav-item"><a class="nav-link active" href="/players.html">JUGADORES</a></li>
        </ul>
        <button id="theme-toggle" title="Cambiar tema" aria-label="Cambiar tema">
          <i class="bi bi-sun-fill"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="players-page" style="padding-top: 80px;">
    <div class="container" style="max-width: 900px; width: 100%;">
      <div class="text-center mb-4">
        <h1 class="page-title">JUGADORES</h1>
        <p class="page-subtitle">REGISTRÁ TU NOMBRE Y ELEGÍ TU AVATAR</p>
      </div>

      <div class="row g-4">
        <!-- Columna: Formulario de registro -->
        <div class="col-lg-5">
          <div class="card h-100" style="border: 1px solid rgba(255,215,0,0.2);">
            <div class="card-body p-4">
              <h2 class="card-title"
                style="font-family:'Press Start 2P',monospace; font-size:0.7rem; color:var(--pac-yellow); margin-bottom:1.5rem;">
                NUEVO JUGADOR
              </h2>

              <!-- Avatar preview + selector -->
              <div class="d-flex align-items-center gap-3 mb-3">
                <div class="avatar-preview" id="avatar-preview">🎮</div>
                <div>
                  <div style="font-family:'Press Start 2P',monospace; font-size:0.45rem; opacity:0.6; margin-bottom:0.5rem;">
                    ELEGÍ TU AVATAR
                  </div>
                  <div class="emoji-grid" id="emoji-grid">
                    <button class="emoji-option selected" data-emoji="🎮" aria-label="Control">🎮</button>
                    <button class="emoji-option" data-emoji="👾" aria-label="Alien">👾</button>
                    <button class="emoji-option" data-emoji="🏆" aria-label="Trofeo">🏆</button>
                    <button class="emoji-option" data-emoji="⭐" aria-label="Estrella">⭐</button>
                    <button class="emoji-option" data-emoji="🔥" aria-label="Fuego">🔥</button>
                    <button class="emoji-option" data-emoji="💀" aria-label="Calavera">💀</button>
                    <button class="emoji-option" data-emoji="🐱" aria-label="Gato">🐱</button>
                    <button class="emoji-option" data-emoji="🦊" aria-label="Zorro">🦊</button>
                    <button class="emoji-option" data-emoji="🐸" aria-label="Rana">🐸</button>
                    <button class="emoji-option" data-emoji="🤖" aria-label="Robot">🤖</button>
                    <button class="emoji-option" data-emoji="👻" aria-label="Fantasma">👻</button>
                    <button class="emoji-option" data-emoji="🌟" aria-label="Estrella brillante">🌟</button>
                  </div>
                </div>
              </div>

              <!-- Campo de nombre -->
              <div class="mb-3">
                <label for="player-name-input"
                  style="font-family:'Press Start 2P',monospace; font-size:0.45rem; display:block; margin-bottom:0.5rem;">
                  NOMBRE
                </label>
                <input type="text" class="form-control" id="player-name-input"
                  placeholder="Tu nombre (2–20 caracteres)"
                  maxlength="20"
                  autocomplete="off"
                  aria-describedby="name-validation-msg"
                  style="font-family:'Press Start 2P',monospace; font-size:0.6rem;" />
                <div class="validation-msg mt-1" id="name-validation-msg" role="alert"></div>
              </div>

              <!-- Botón registrar -->
              <button class="btn btn-warning w-100 mt-2 btn-lg-arcade" id="register-btn"
                disabled
                style="font-family:'Press Start 2P',monospace;">
                REGISTRAR JUGADOR
              </button>

              <!-- Mensaje de feedback del registro -->
              <div id="register-feedback" class="mt-2" role="alert" aria-live="polite"></div>
            </div>
          </div>
        </div>

        <!-- Columna: Lista de jugadores + botón jugar -->
        <div class="col-lg-7">
          <div class="card h-100" style="border: 1px solid rgba(255,215,0,0.2);">
            <div class="card-body p-4">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="card-title mb-0"
                  style="font-family:'Press Start 2P',monospace; font-size:0.7rem; color:var(--pac-yellow);">
                  JUGADORES GUARDADOS
                </h2>
                 <button class="btn btn-outline-secondary btn-refresh-arcade" id="refresh-btn"
                  aria-label="Actualizar lista"
                  style="font-family:'Press Start 2P',monospace;">
                  🔄
                </button>
              </div>

              <!-- Lista -->
              <div class="player-list" id="player-list" aria-live="polite">
                <div class="text-center py-3" id="players-loading">
                  <div class="spinner-border spinner-border-sm text-warning" role="status">
                    <span class="visually-hidden">Cargando...</span>
                  </div>
                </div>
              </div>

              <!-- Jugador seleccionado -->
              <div class="mt-3 p-2 rounded" id="selected-player-display"
                style="background: rgba(255,215,0,0.05); border: 1px dashed rgba(255,215,0,0.3); display:none;">
                <div style="font-family:'Press Start 2P',monospace; font-size:0.4rem; opacity:0.7; margin-bottom:0.3rem;">
                  JUGADOR SELECCIONADO:
                </div>
                <div style="font-family:'Press Start 2P',monospace; font-size:0.6rem; color:var(--pac-yellow);"
                  id="selected-player-name">
                </div>
              </div>

              <!-- Botón Jugar -->
              <div class="mt-3">
                <a href="/index.html" class="btn btn-warning w-100 btn-lg-arcade" id="play-btn"
                  style="font-family:'Press Start 2P',monospace;">
                  🎮 ¡JUGAR!
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal: jugador registrado exitosamente -->
  <div class="modal fade" id="success-modal" tabindex="-1"
    aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-body text-center p-4">
          <div style="font-size:3rem; margin-bottom:1rem;">✅</div>
          <div id="success-modal-text"
            style="font-family:'Press Start 2P',monospace; font-size:0.55rem; line-height:2;">
          </div>
        </div>
        <div class="modal-footer border-0 justify-content-center">
          <button class="btn btn-warning btn-lg-arcade" data-bs-dismiss="modal"
            style="font-family:'Press Start 2P',monospace;">
            OK
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/scripts/players.js"></script>
</body>
</html>
